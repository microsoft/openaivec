name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (e.g. V2.0.0)"
        required: true
        default: "V2.0.0"
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.tag }}" -m "Release ${{ github.event.inputs.tag }}"
          git push origin "${{ github.event.inputs.tag }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies via uv
        run: uv sync --all-extras --dev

      - name: Build with uv
        run: uv build

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with cosign (OIDC)
        run: |
          set -euo pipefail
          ls -la dist
          mkdir -p signatures
          for f in dist/*; do
            if [ -f "$f" ]; then
              base="$(basename "$f")"
              cosign sign-blob --yes \
                --output-signature "signatures/${base}.sig" \
                --output-certificate "signatures/${base}.pem" \
                "$f"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            signatures/*.sig
            signatures/*.pem

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
